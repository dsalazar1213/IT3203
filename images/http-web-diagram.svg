<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">HTTP and World Wide Web Diagram</title>
  <desc id="desc">A simple diagram showing a browser sending an HTTP request to a server and the server sending an HTTP response back.</desc>
  <rect width="900" height="420" fill="#f5f7fb"/>
  <rect x="70" y="110" width="240" height="170" rx="14" fill="#e8f1fb" stroke="#1f5a96" stroke-width="3"/>
  <text x="190" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#113b67">Client</text>
  <text x="190" y="190" text-anchor="middle" font-family="Arial" font-size="24" fill="#1f2937">Web Browser</text>
  <text x="190" y="225" text-anchor="middle" font-family="Arial" font-size="20" fill="#1f2937">User clicks a link</text>
  <rect x="590" y="110" width="240" height="170" rx="14" fill="#eef7ef" stroke="#2f855a" stroke-width="3"/>
  <text x="710" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#22543d">Server</text>
  <text x="710" y="190" text-anchor="middle" font-family="Arial" font-size="24" fill="#1f2937">Hosts web resources</text>
  <text x="710" y="225" text-anchor="middle" font-family="Arial" font-size="20" fill="#1f2937">Returns content</text>
  <line x1="310" y1="175" x2="590" y2="175" stroke="#113b67" stroke-width="5"/>
  <polygon points="590,175 565,160 565,190" fill="#113b67"/>
  <text x="450" y="150" text-anchor="middle" font-family="Arial" font-size="22" fill="#113b67">HTTP Request</text>
  <line x1="590" y1="225" x2="310" y2="225" stroke="#2f855a" stroke-width="5"/>
  <polygon points="310,225 335,210 335,240" fill="#2f855a"/>
  <text x="450" y="255" text-anchor="middle" font-family="Arial" font-size="22" fill="#22543d">HTTP Response</text>
  <text x="450" y="340" text-anchor="middle" font-family="Arial" font-size="24" fill="#1f2937">The World Wide Web depends on this request and response exchange.</text>
</svg>
